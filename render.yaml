services:
  # Backend Python API
  - type: web
    name: edugen-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    plan: free

  # Frontend React App  
  - type: web
    name: edugen-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://edugen-backend-isa4.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 417182243430-9f86d2iehab7m448qek8vukneo4emni4.apps.googleusercontent.com
    plan: free
