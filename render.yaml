services:
  # Backend Python API
  - type: web
    name: edugen-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    plan: free

  # Frontend React App  
  - type: web
    name: edugen-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://edugen-backend.onrender.com
    envVars:
      - key: VITE_API_URL
        value: https://edugen-backend.onrender.com
    plan: free
