services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edugen-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Optional: Mount local backend folder to support hot-reloading in dev.
      # For production, remove this to use the files inside the container.
      - ./backend:/app
      # Exclude the virtual environment to prevent conflicts
      - /app/venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edugen-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
